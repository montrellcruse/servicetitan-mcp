name: Feature Request
description: Suggest a new tool or feature
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or tool you'd like.
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New domain tool
        - New intelligence tool
        - Server feature
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
